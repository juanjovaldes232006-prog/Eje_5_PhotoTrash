      <h1>PhotoTrash</h1>
      <p class="frase">
        Cada imagen que capturas nace con un destino silencioso:<br>
        ser vista un instante, olvidada al siguiente,<br>
        y enterrada para siempre en el fondo de una carpeta.<br><br>
        Fotografiar no es solo apretar un botón.<br>
